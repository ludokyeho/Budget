<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f2" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./src/styles.css" />
    <title>Budget</title>
  </head>
  <body>
    <div id="root">
      <main class="boot-fallback">
        <section>
          <h1>Budget</h1>
          <p>Chargement de l'application...</p>
        </section>
      </main>
    </div>
    <noscript>Active JavaScript pour utiliser Budget.</noscript>
    <script>
      window.addEventListener("error", function (event) {
        var root = document.getElementById("root");
        if (!root) return;
        root.innerHTML = '<main class="boot-fallback"><section><h1>Budget</h1><p>Erreur au chargement : ' + String(event.message || "fichier introuvable") + '</p></section></main>';
      });
      window.addEventListener("unhandledrejection", function (event) {
        var root = document.getElementById("root");
        if (!root) return;
        var reason = event.reason && event.reason.message ? event.reason.message : event.reason;
        root.innerHTML = '<main class="boot-fallback"><section><h1>Budget</h1><p>Erreur de synchronisation : ' + String(reason || "inconnue") + '</p></section></main>';
      });
    </script>
    <script src="./src/config.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
